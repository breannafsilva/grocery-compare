trigger:
  branches:
    include:
      - main

pr: none

pool:
  vmImage: ubuntu-latest

variables:
  NODE_VERSION: "22.x"
  CLOUDFLARE_ACCOUNT_ID: "b158f2363ed6a1bec5ff4ff2d79088fc"
  NEXT_PUBLIC_DEFAULT_POSTAL_CODE: "60647"

steps:
  - checkout: self

  - task: NodeTool@0
    displayName: "Use Node.js $(NODE_VERSION)"
    inputs:
      versionSpec: "$(NODE_VERSION)"

  - script: npm ci
    displayName: "Install dependencies"

  - script: npm run lint
    displayName: "Lint"

  - script: npm run build
    displayName: "Build"
    env:
      NEXT_PUBLIC_DEFAULT_POSTAL_CODE: $(NEXT_PUBLIC_DEFAULT_POSTAL_CODE)

  - script: npx wrangler deploy --config dist/server/wrangler.json --name compare-grocer
    displayName: "Deploy to Cloudflare Workers"
    env:
      CLOUDFLARE_ACCOUNT_ID: $(CLOUDFLARE_ACCOUNT_ID)
      CLOUDFLARE_API_TOKEN: $(CLOUDFLARE_API_TOKEN)
